server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend React/Vite SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache per asset statici buildati da Vite
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}